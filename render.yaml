services:
  - type: web
    name: yuvanaurum
    runtime: python
    region: singapore
    plan: starter        # disks need a paid plan; use "free" without the disk block
    buildCommand: pip install -r requirements-render.txt
    # ONE worker: APScheduler jobs run once, async task queue + SSE share state.
    # gthread + 12 threads handles streaming chats concurrently.
    startCommand: gunicorn app:app --workers 1 --worker-class gthread --threads 12 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: AURUM_TZ
        value: Asia/Kolkata
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: NARA_API_KEY
        sync: false
      - key: BLUESMINDS_KEY
        sync: false
      - key: OMNIROUTE_API_KEY
        sync: false
      - key: OMNIROUTE_URL
        value: https://api.omniroute.online/v1
      - key: OMNIROUTE_MODEL
        value: auto
      - key: NARA_MODEL
        value: mistral-large
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: WEB_SEARCH_KEY
        sync: false
      - key: ADMIN_USERNAMES
        sync: false
      - key: AI_PROVIDER_ORDER
        value: nara,github,bluesminds,gemini,openai,omniroute,ollama
      - key: RENDER_DATA_DIR
        value: /data
    disk:
      name: aiaurum-data
      mountPath: /data
      sizeGB: 1
